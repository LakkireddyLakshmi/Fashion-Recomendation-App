services:
  # ── Backend: FastAPI Web Service ──
  - type: web
    name: hueiq-backend
    runtime: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: cd fashion_ai && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: BOSS_API_URL
        sync: false
      - key: BOSS_TOKEN
        sync: false
      - key: BOSS_ADMIN_EMAIL
        sync: false
      - key: BOSS_ADMIN_PASSWORD
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: API_HOST
        value: "0.0.0.0"
      - key: DEBUG
        value: "False"
      - key: CACHE_TTL
        value: "3600"
      - key: MAX_CANDIDATES
        value: "500"
      - key: DEFAULT_TOP_K
        value: "10"
      - key: EMBEDDING_DIM
        value: "128"
      - key: VISUAL_DIM
        value: "512"

  # ── Frontend: React Static Site ──
  - type: web
    name: hueiq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
