name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'fashion_ai/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

env:
  RESOURCE_GROUP: hue-ai-rg
  LOCATION: westus2
  IMAGE_NAME: fashion-ai-backend
  CONTAINER_APP_NAME: fashion-ai-backend
  CONTAINER_APP_ENV: managedEnvironment-hueairg-8698

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Log in to Azure ──────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.CLIENT_ID }}","clientSecret":"${{ secrets.SECRET_ID }}","subscriptionId":"${{ secrets.SUBSCRIPTIONID }}","tenantId":"${{ secrets.TENANT_ID }}"}'

      # ── Create ACR if not exists ─────────────────────────────────────────────
      - name: Ensure ACR exists
        run: |
          az acr show --name fashionairegistry --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null || \
          az acr create --resource-group ${{ env.RESOURCE_GROUP }} --name fashionairegistry --sku Basic --admin-enabled true

      # ── Build & push image to Azure Container Registry ───────────────────────
      - name: Log in to Azure Container Registry
        run: az acr login --name fashionairegistry

      - name: Build and push Docker image
        run: |
          docker build -t fashionairegistry.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t fashionairegistry.azurecr.io/${{ env.IMAGE_NAME }}:latest \
                       -f Dockerfile .
          docker push fashionairegistry.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push fashionairegistry.azurecr.io/${{ env.IMAGE_NAME }}:latest

      # ── Create app if it doesn't exist, otherwise update ─────────────────────
      - name: Deploy to Azure Container Apps
        run: |
          EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query name --output tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating new Container App..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image fashionairegistry.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-server fashionairegistry.azurecr.io \
              --target-port ${{ vars.API_PORT }} \
              --ingress external \
              --min-replicas 1 \
              --env-vars \
                API_HOST="${{ vars.API_HOST }}" \
                API_PORT="${{ vars.API_PORT }}" \
                BOSS_API_URL="${{ vars.BOSS_API_URL }}" \
                BOSS_TOKEN="${{ secrets.BOSS_TOKEN }}" \
                BOSS_ADMIN_EMAIL="${{ secrets.BOSS_ADMIN_EMAIL }}" \
                BOSS_ADMIN_PASSWORD="${{ secrets.BOSS_ADMIN_PASSWORD }}" \
                DIFY_API_URL="${{ vars.DIFY_API_URL }}" \
                DIFY_API_KEY="${{ secrets.DIFY_API_KEY }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                JWT_EXPIRE_HOURS="${{ vars.JWT_EXPIRE_HOURS }}" \
                DEBUG="${{ vars.DEBUG }}" \
                CACHE_TTL="${{ vars.CACHE_TTL }}" \
                DEFAULT_TOP_K="${{ vars.DEFAULT_TOP_K }}" \
                MAX_CANDIDATES="${{ vars.MAX_CANDIDATES }}" \
                EMBEDDING_DIM="${{ vars.EMBEDDING_DIM }}" \
                VISUAL_DIM="${{ vars.VISUAL_DIM }}"
          else
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image fashionairegistry.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --set-env-vars \
                API_HOST="${{ vars.API_HOST }}" \
                API_PORT="${{ vars.API_PORT }}" \
                BOSS_API_URL="${{ vars.BOSS_API_URL }}" \
                BOSS_TOKEN="${{ secrets.BOSS_TOKEN }}" \
                BOSS_ADMIN_EMAIL="${{ secrets.BOSS_ADMIN_EMAIL }}" \
                BOSS_ADMIN_PASSWORD="${{ secrets.BOSS_ADMIN_PASSWORD }}" \
                DIFY_API_URL="${{ vars.DIFY_API_URL }}" \
                DIFY_API_KEY="${{ secrets.DIFY_API_KEY }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                JWT_EXPIRE_HOURS="${{ vars.JWT_EXPIRE_HOURS }}" \
                DEBUG="${{ vars.DEBUG }}" \
                CACHE_TTL="${{ vars.CACHE_TTL }}" \
                DEFAULT_TOP_K="${{ vars.DEFAULT_TOP_K }}" \
                MAX_CANDIDATES="${{ vars.MAX_CANDIDATES }}" \
                EMBEDDING_DIM="${{ vars.EMBEDDING_DIM }}" \
                VISUAL_DIM="${{ vars.VISUAL_DIM }}"
          fi

      # ── Print live URL ────────────────────────────────────────────────────────
      - name: Show deployment URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Backend live at: https://$URL"
